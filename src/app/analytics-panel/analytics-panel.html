<aside class="analytics-panel">
  <!-- Header -->
  <div class="panel-header">
    <h3>Your Progress</h3>
    <span class="status-dot active">Active</span>
  </div>

  <!-- Today Overview -->
  <section class="card highlight">
    <p class="card-title">Today</p>

    <div class="stat-row">
      <div>
        <p class="stat-label">Study Time</p>
        <p class="stat-value">0 <span>min</span></p>
      </div>
      <div class="progress-ring" style="--value: 0;"></div>
    </div>

    <div class="stat-grid">
      <div class="mini-stat">
        <p>Questions</p>
        <strong>0</strong>
      </div>
      <div class="mini-stat">
        <p>Solutions</p>
        <strong>0</strong>
      </div>
    </div>
  </section>

  <!-- Focus Area -->
  <section class="card">
    <p class="card-title">Focus Area</p>
    <div class="focus-chip muted">
      No topic started yet
    </div>
  </section>

  <!-- Consistency -->
  <section class="card">
    <p class="card-title">Consistency</p>

    <div class="consistency-row">
      <div>
        <p class="stat-label">Current Streak</p>
        <p class="stat-value">0 <span>days</span></p>
      </div>
      <div class="streak-bar">
        <span style="width: 0%"></span>
      </div>
    </div>

    <p class="last-active">Last active: <strong>Today</strong></p>
  </section>
</aside>
